## 项目总目标

详见 `pro.md` 和 `MAIN.md`（由架构师 agent 产出）。

## 你的职责

### 1. 四叉树 (Quadtree) 实现
- 实现一个泛用的 2D 四叉树，支持动态插入和清空重建
- 树节点存储：边界矩形、总质量、质心位置、子节点指针
- 叶节点存储实际天体对象引用
- 支持设置最大容量（每个节点最多容纳 N 个天体后分裂，建议 N=4）

### 2. Barnes-Hut 近似
- 对于远距离的引力计算，用节点质心代替子树中所有天体分别计算
- 判断条件：`s / d < θ`（s = 节点边长，d = 目标到质心的距离，θ 为阈值 ≈ 0.5）
- θ 可调节，用于平衡精度与性能

### 3. 空间查询接口
- **范围查询** (Range Query)：给定圆形/矩形区域，返回区域内所有天体
- **最近邻查询** (Nearest Neighbor)：给定坐标，返回最近的天体
- **碰撞候选查询**：返回可能发生碰撞的天体对

### 4. 双端队列 (Deque) 轨迹系统
- 使用 `collections.deque` 为每个天体维护一条历史轨迹
- 固定最大长度（如 300 帧，约 5 秒 @ 60fps）
- 每帧将当前位置 `(x, y)` 追加到对应天体的 deque 中
- 提供"时间倒退"功能：从 deque 中读取历史坐标并回放

### 5. 性能优化
- 每帧重建四叉树（或清空后重新插入）
- 天体数量 < 50 时可退化到 O(n²) 以省去重建开销
- 天体数量 > 500 时必须使用 Barnes-Hut

## 技术约束

- 四叉树是**纯数据结构**，不依赖 Pygame
- 与物理引擎通过 NumPy 数组交换数据
- 提供计时/统计信息（每帧重建耗时、查询次数等）

